<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      .node { fill: none; stroke: #e0e0e0; stroke-width: 1.5; }
      .node-active { fill: none; stroke: #4a9eff; stroke-width: 2; }
      .connection { stroke: #e0e0e0; stroke-width: 1; opacity: 0.4; }
      .connection-active { stroke: #4a9eff; stroke-width: 1.5; opacity: 0.6; }
      .spoon { fill: none; stroke: #333333; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .spoon-fade { fill: none; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#0d1117"/>

  <!-- Network nodes - Layer 1 (leftmost, in the handle) -->
  <circle cx="120" cy="150" r="6" class="node"/>
  <circle cx="120" cy="200" r="6" class="node-active"/>
  <circle cx="120" cy="250" r="6" class="node"/>

  <!-- Network nodes - Layer 2 -->
  <circle cx="185" cy="135" r="6" class="node"/>
  <circle cx="185" cy="175" r="6" class="node-active"/>
  <circle cx="185" cy="215" r="6" class="node-active"/>
  <circle cx="185" cy="255" r="6" class="node"/>

  <!-- Network nodes - Layer 3 -->
  <circle cx="250" cy="145" r="6" class="node-active"/>
  <circle cx="250" cy="190" r="6" class="node-active"/>
  <circle cx="250" cy="235" r="6" class="node"/>
  <circle cx="250" cy="280" r="6" class="node"/>

  <!-- Network nodes - Layer 4 (transition zone) -->
  <circle cx="315" cy="155" r="5" class="node-active"/>
  <circle cx="315" cy="200" r="5" class="node-active"/>
  <circle cx="315" cy="245" r="5" class="node-active"/>

  <!-- Connections Layer 1→2 -->
  <line x1="126" y1="150" x2="179" y2="135" class="connection"/>
  <line x1="126" y1="150" x2="179" y2="175" class="connection"/>
  <line x1="126" y1="200" x2="179" y2="175" class="connection-active"/>
  <line x1="126" y1="200" x2="179" y2="215" class="connection-active"/>
  <line x1="126" y1="250" x2="179" y2="215" class="connection"/>
  <line x1="126" y1="250" x2="179" y2="255" class="connection"/>
  <line x1="126" y1="150" x2="179" y2="215" class="connection"/>
  <line x1="126" y1="200" x2="179" y2="135" class="connection"/>
  <line x1="126" y1="200" x2="179" y2="255" class="connection"/>
  <line x1="126" y1="250" x2="179" y2="135" class="connection"/>

  <!-- Connections Layer 2→3 -->
  <line x1="191" y1="135" x2="244" y2="145" class="connection"/>
  <line x1="191" y1="175" x2="244" y2="145" class="connection-active"/>
  <line x1="191" y1="175" x2="244" y2="190" class="connection-active"/>
  <line x1="191" y1="215" x2="244" y2="190" class="connection-active"/>
  <line x1="191" y1="215" x2="244" y2="235" class="connection"/>
  <line x1="191" y1="255" x2="244" y2="235" class="connection"/>
  <line x1="191" y1="255" x2="244" y2="280" class="connection"/>
  <line x1="191" y1="135" x2="244" y2="190" class="connection"/>
  <line x1="191" y1="215" x2="244" y2="145" class="connection"/>
  <line x1="191" y1="175" x2="244" y2="235" class="connection"/>

  <!-- Connections Layer 3→4 -->
  <line x1="256" y1="145" x2="310" y2="155" class="connection-active"/>
  <line x1="256" y1="145" x2="310" y2="200" class="connection"/>
  <line x1="256" y1="190" x2="310" y2="155" class="connection-active"/>
  <line x1="256" y1="190" x2="310" y2="200" class="connection-active"/>
  <line x1="256" y1="190" x2="310" y2="245" class="connection"/>
  <line x1="256" y1="235" x2="310" y2="200" class="connection"/>
  <line x1="256" y1="235" x2="310" y2="245" class="connection"/>
  <line x1="256" y1="280" x2="310" y2="245" class="connection"/>

  <!-- Transition: network fading into spoon handle -->
  <!-- Small dots that fade from nodes to the spoon line -->
  <circle cx="345" cy="165" r="3.5" fill="none" stroke="#4a9eff" stroke-width="1.5" opacity="0.5"/>
  <circle cx="345" cy="200" r="3.5" fill="none" stroke="#4a9eff" stroke-width="1.5" opacity="0.5"/>
  <circle cx="345" cy="237" r="3.5" fill="none" stroke="#4a9eff" stroke-width="1.5" opacity="0.5"/>

  <circle cx="375" cy="178" r="2.5" fill="none" stroke="#4a9eff" stroke-width="1.2" opacity="0.35"/>
  <circle cx="375" cy="205" r="2.5" fill="none" stroke="#4a9eff" stroke-width="1.2" opacity="0.35"/>
  <circle cx="375" cy="230" r="2.5" fill="none" stroke="#4a9eff" stroke-width="1.2" opacity="0.35"/>

  <!-- Fading connections in transition -->
  <line x1="320" y1="155" x2="342" y2="165" stroke="#4a9eff" stroke-width="1" opacity="0.35"/>
  <line x1="320" y1="200" x2="342" y2="200" stroke="#4a9eff" stroke-width="1" opacity="0.35"/>
  <line x1="320" y1="245" x2="342" y2="237" stroke="#4a9eff" stroke-width="1" opacity="0.35"/>
  <line x1="348" y1="165" x2="372" y2="178" stroke="#4a9eff" stroke-width="0.8" opacity="0.25"/>
  <line x1="348" y1="200" x2="372" y2="205" stroke="#4a9eff" stroke-width="0.8" opacity="0.25"/>
  <line x1="348" y1="237" x2="372" y2="230" stroke="#4a9eff" stroke-width="0.8" opacity="0.25"/>

  <!-- The spoon - handle emerging from the network -->
  <!-- Handle: starts where network ends, gentle curve -->
  <path d="M 395 200
           C 420 200, 440 198, 470 195
           C 500 192, 530 190, 555 192
           C 575 194, 590 200, 600 210"
        class="spoon-fade" stroke="url(#handleGradient)"/>

  <!-- Bowl of the spoon -->
  <path d="M 600 210
           C 615 225, 640 260, 660 275
           C 680 290, 710 295, 730 280
           C 750 265, 755 235, 745 210
           C 735 185, 710 170, 685 170
           C 660 170, 635 180, 620 195
           C 610 205, 603 212, 600 210"
        class="spoon" stroke="#cccccc"/>

  <!-- Gradient for handle transition from blue to gray -->
  <defs>
    <linearGradient id="handleGradient" x1="395" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4a9eff" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#7ab8ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#cccccc" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Title text -->
  <text x="400" y="345" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="300" letter-spacing="8" fill="#e0e0e0">THERE IS NO SPOON</text>

  <!-- Subtitle -->
  <text x="400" y="375" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="300" letter-spacing="3" fill="#666666">A MACHINE LEARNING PRIMER</text>

</svg>
